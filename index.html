<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Amazon.in</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="navbar">

            <div class="nav-logo nav-hover-border">
                <div class="logo"></div>
            </div>

            <div class="nav-address nav-hover-border">
                <p class="nav-upper-text" style="margin-left: 20px">Deliver to</p>
                <div class="address-icon">
                    <i class="fa-solid fa-location-dot"></i>
                    <p class="nav-lower-text" style="margin-left: 2px">India</p>
                </div>
            </div>

            <div class="nav-search-bar">
                <select class="nav-search-select">
                    <option>All</option>
                </select>
                <input placeholder="Search Amazon" type="text" class="searchbar">
                <div class="search-icon">
                    <button id="search-button"><i class="fa-solid fa-magnifying-glass"></i></button>

                </div>

            </div>

        </div>
    </header>
</body>
</html>
